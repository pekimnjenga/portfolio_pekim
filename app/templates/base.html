<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  
  <!-- Preconnect to external origins to speed up resource discovery -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  
  <title>PEKIMdev | Uncompromising Quality, Unrivaled Performance</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Poppins:wght@600;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/resume.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/home.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/about.css') }}">
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark custom-navbar sticky-top">
    <div class="container">
      <a class="navbar-brand brand-container" href="/">
        <div class="brand-top">
          <span class="brand-title">PEKIM<span class="brand-accent">dev</span></span>
          <div class="logo-monogram">
            <svg viewBox="0 0 100 20" xmlns="http://www.w3.org/2000/svg">
              <path class="trace-line" d="M0 10 H30 L40 2 L50 18 L60 10 H100" />
              <circle class="node pulse" cx="40" cy="2" r="2.5" />
              <circle class="node" cx="50" cy="18" r="2.5" />
            </svg>
          </div>
        </div>
        <span class="brand-tagline">UNCOMPROMISING QUALITY, <br class="d-sm-none"> UNRIVALED PERFORMANCE</span>
      </a>

      <button class="navbar-toggler" type="button" id="mobile-toggle">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarNav">
        <div class="mobile-menu-close d-lg-none">
          <button type="button" class="btn-close-custom" id="close-menu">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <ul class="navbar-nav ms-auto align-items-center">
          <li class="nav-item"><a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">Home</a></li>
          <li class="nav-item"><a class="nav-link {% if request.path == '/about' %}active{% endif %}" href="/about">About</a></li>
          <li class="nav-item"><a class="nav-link {% if request.path == '/projects' %}active{% endif %}" href="/projects">Projects</a></li>
          <li class="nav-item"><a class="nav-link {% if request.path == '/contact' %}active{% endif %}" href="/contact">Contact</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="page-container">
    {% block content %}{% endblock %}
  </div>

  <footer class="site-footer">
    <div class="footer-inner container">
      <nav class="footer-center">
        <a href="https://github.com/pekimnjenga" class="social-link"><i class="fab fa-github"></i></a>
        <a href="https://linkedin.com/in/peter-kimani-aa4954282" class="social-link"><i class="fab fa-linkedin"></i></a>
        <a href="https://wa.me/254797933409" class="social-link"><i class="fab fa-whatsapp"></i></a>
      </nav>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='js/script.js') }}"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register("{{ url_for('static', filename='js/sw.js') }}")
          .then(reg => console.log('Service Worker registered'))
          .catch(err => console.log('Service Worker failed', err));
      });
    }
  </script>
</body>
</html>
